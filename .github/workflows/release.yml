name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libdbus-1-dev

      - name: Install aqtinstall with Qt 6.11 support
        run: |
          pip install git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head

      - name: Install Qt 6.11 via aqtinstall
        env:
          QT_VER: 6.11.1
        run: |
          aqt install-qt linux desktop $QT_VER linux_gcc_64 -O "${{ runner.temp }}/Qt" --modules qtshadertools

      - name: Configure
        env:
          QT_VER: 6.11.1
        run: |
          QTDIR=$(ls -d ${{ runner.temp }}/Qt/$QT_VER/*/lib/cmake/Qt6 2>/dev/null | head -1 | xargs dirname | xargs dirname | xargs dirname)
          echo "Found Qt at: $QTDIR"
          cmake -B build -S plugin -DCMAKE_PREFIX_PATH="$QTDIR"

      - name: Build
        run: cmake --build build --target fluidsimplugin

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME}
          PKG="FluxEngine-${TAG}-linux-x86_64"
mkdir -p dist/${PKG}/FluxEngine
cp -r build/FluxEngine/libfluxengineplugin.so dist/${PKG}/FluxEngine/
cp -r build/FluxEngine/qmldir dist/${PKG}/FluxEngine/
cp -r build/FluxEngine/fluxengine.qmltypes dist/${PKG}/FluxEngine/
cp -r build/FluxEngine/shaders dist/${PKG}/FluxEngine/
          cd dist
          tar czf ../${PKG}.tar.gz ${PKG}/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: FluxEngine-*.tar.gz
          generate_release_notes: true
