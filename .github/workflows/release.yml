name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgl1-mesa-dev libxkbcommon-dev libfontconfig1-dev libdbus-1-dev

      - name: Install aqtinstall with Qt 6.11 support
        run: |
          pip install git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head

      - name: Install Qt 6.11 via aqtinstall
        env:
          QT_VER: 6.11.1
        run: |
          aqt install-qt linux desktop $QT_VER linux_gcc_64 -O "${{ runner.temp }}/Qt" --modules qtshadertools

      - name: Configure
        env:
          QT_VER: 6.11.1
        run: |
          Qt6_DIR="${{ runner.temp }}/Qt/$QT_VER/linux_gcc_64/lib/cmake/Qt6"
          cmake -B build -S plugin -DCMAKE_PREFIX_PATH="${{ runner.temp }}/Qt/$QT_VER/linux_gcc_64"

      - name: Build
        run: cmake --build build --target fluidsimplugin

      - name: Package
        run: |
          TAG=${GITHUB_REF_NAME}
          PKG="FluidSim-${TAG}-linux-x86_64"
          mkdir -p dist/${PKG}/FluidSim
          cp -r build/FluidSim/libfluidsimplugin.so dist/${PKG}/FluidSim/
          cp -r build/FluidSim/qmldir dist/${PKG}/FluidSim/
          cp -r build/FluidSim/fluidsim.qmltypes dist/${PKG}/FluidSim/
          cp -r build/FluidSim/shaders dist/${PKG}/FluidSim/
          cd dist
          tar czf ../${PKG}.tar.gz ${PKG}/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: FluidSim-*.tar.gz
          generate_release_notes: true
